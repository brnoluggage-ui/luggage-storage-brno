<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#2563EB"/>
  <circle cx="100" cy="100" r="85" fill="#3B82F6"/>
  
  <!-- Luggage icon -->
  <rect x="70" y="80" width="60" height="70" rx="4" fill="white" stroke="#1E40AF" stroke-width="3"/>
  <rect x="75" y="85" width="50" height="60" rx="2" fill="#DBEAFE"/>
  
  <!-- Handle -->
  <path d="M85 80 L85 70 Q85 65 90 65 L110 65 Q115 65 115 70 L115 80" 
        stroke="white" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Lock -->
  <circle cx="100" cy="115" r="8" fill="#1E40AF"/>
  <rect x="98" y="115" width="4" height="12" fill="#1E40AF"/>
  
  <!-- Decorative lines on luggage -->
  <line x1="70" y1="95" x2="130" y2="95" stroke="#3B82F6" stroke-width="2"/>
  <line x1="70" y1="105" x2="130" y2="105" stroke="#3B82F6" stroke-width="2"/>
  <line x1="70" y1="135" x2="130" y2="135" stroke="#3B82F6" stroke-width="2"/>
</svg>
